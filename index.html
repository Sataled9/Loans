<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/css/all.min.css"/>
    <link rel="stylesheet" href="/css/style.css">
    <title>Loans</title>
  
</head>
<body>
    <!-- Header nav -->
    <header>
        <nav class="nav-container"> 
           <div class="logo-container"><a href="#">Loans.com</a>
            </div> 
            
        <div class="menu-container">   
            <ul class="menu-list">
                <li class="menu-item"><a href="#">Rates & Fees</a></li>
                <li class="menu-item"><a href="#">How to play</a></li>
                <li class="menu-item"><a href="#">Questions</a></li>
            </ul>
        </div> 
    </nav>
</header>
    
    <!-- Main -->
    <main>
        <div class="main__container">
            <div class="main_text">
            <p>Personal Loan</p>
            <h1>Put your plans<br>into action.</h1>
            

        <div class="icon">
            <div class="icons__item">
                <p>Online application</p>
            </div>
            <div class="icons__item">
                <p>Up to $50.000</p>
            </div>
            <div class="icons__item">
                <p>The money is<br> yours in 48h</p>
            </div>
        </div>
</div>
        <div class="main_left__container">
            <h2>Let's change your life</h2>
            
            <form class="main_form">

                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" placeholder="Jhon Doe">

                    <label for="email"><b>Email</b></label>
                    <input type="text" placeholder="john.doe@apple.com" name="email">
                    
                    <label for="number"><b>How much do you need?</b></label>
                    <input type="number" placeholder="1.000" name="number">
                
               
                    <input type="submit" value="Check your rates">
                    </div>
                  </div>
                </form>
        
        </div>
        </main>
    
</body>
</html>
